name: CI Pipeline

on:
  push:
    paths:
      - '**.py'
      - 'Dockerfile'
      - 'requirements*.txt'

  pull_request:
    paths:
      - '**.py'
      - 'Dockerfile'
      - 'requirements*.txt'

  schedule:
    - cron: '0 11 * * *'

jobs:
  docker-e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build . --file Dockerfile --tag test-scraper:latest

      - name: Run Docker container (E2E)
        run: |
          mkdir -p public
          # Run the scraper directly inside the container to test execution
          docker run --rm -v ${{ github.workspace }}/public:/app/public test-scraper:latest python scraper.py

      - name: Verify Output
        run: |
          if [ ! -f public/index.html ]; then
            echo "Error: public/index.html was not generated by the container."
            exit 1
          fi
          echo "Output generated successfully."
